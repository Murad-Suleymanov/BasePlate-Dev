pool: payments
hpa:
  minReplicas: 1
  maxReplicas: 1
  # NOTE: istio_requests_total only counts the initial WebSocket HTTP upgrade,
  # not message throughput — RPS is a weak scaling signal here. Consider CPU
  # (drop targetRPS) if connection/message load is the real bottleneck.
  targetRPS: 100
  window: 2m       # smooth the bursty upgrade traffic over 2 minutes
resources:
  requests:
    memory: 200Mi
    cpu: 100m
  limits:
    memory: 250Mi
    cpu: 150m

traffic: 
  provider: istio

readinessProbe:
  path: /health

livenessProbe:
  path: /health
