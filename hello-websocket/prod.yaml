hpa:
  minReplicas: 1
  maxReplicas: 2
  # NOTE: istio_requests_total only counts the initial WebSocket HTTP upgrade,
  # not message throughput — RPS is a weak scaling signal here. Consider CPU
  # (drop targetRPS) if connection/message load is the real bottleneck.
  targetRPS: 100
resources:
  requests:
    memory: 200Mi
    cpu: 100m
  limits:
    memory: 250Mi
    cpu: 150m

traffic: 
  provider: istio

readinessProbe:
  path: /health

livenessProbe:
  path: /health
