main:
  # Single scaling signal. Pick the type the platform resolves the metric for:
  #   cpu / memory — utilization %, served by metrics-server.
  #   rps          — Istio requests/sec per pod (integer); needs traffic.
  #   worker       — worker-pool saturation % (100×busy/max); needs metrics. A
  #                  central recording rule normalizes per-runtime worker gauges
  #                  into app_worker_utilization, so this is language-agnostic.
  hpa:
    minReplicas: 1
    maxReplicas: 1
    scaleType: worker
    target: 70

  # Required for the worker signal. This is the scrape endpoint: the operator
  # creates a ServiceMonitor that scrapes the workload's http port (containerPort)
  # at `path`. So the app MUST serve php-fpm_exporter output (phpfpm_active_processes,
  # phpfpm_total_processes) at this path on its own http port — the operator scrapes
  # only the http port, not a separate exporter port.
  metrics:
    enabled: true
    path: /metrics

  resources:
    requests:
      memory: 200Mi
      cpu: 150m
    limits:
      memory: 300Mi
      cpu: 250m

  # Required only for the rps signal (kept here so switching scaleType: rps works).
  traffic:
    provider: istio
