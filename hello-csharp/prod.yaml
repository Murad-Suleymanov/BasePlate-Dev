main:
  hpa:
    minReplicas: 1
    maxReplicas: 2
  resources:
    requests:
      memory: 200Mi
      cpu: 100m
    limits:
      memory: 250Mi
      cpu: 150m

  traffic:
    rateLimit:
      enabled: true
      mode: local
      local:
        requestsPerSecond: 100
        burst: 20

  readinessProbe:
    path: /Health

  livenessProbe:
    path: /Health


testing:
  inheritFrom: main        # main-in bütün konfiqi
  route:
    shareWith: main        # öz host-u yox; main-in host-una (hello-csharp-main-prod) qoşul
    pathPrefix: /testing   # yalnız /testing → testing; qalan hər şey → main
