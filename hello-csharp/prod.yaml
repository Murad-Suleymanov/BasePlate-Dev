main: &main
  hpa:
    minReplicas: 1
    maxReplicas: 2
    targetRPS: 100
  resources:
    requests:
      memory: 200Mi
      cpu: 100m
    limits:
      memory: 250Mi
      cpu: 150m

  traffic:
    rateLimit:
      enabled: true
      mode: local
      local:
        requestsPerSecond: 100
        burst: 20

  readinessProbe:
    path: /Health

  livenessProbe:
    path: /Health

# testing = main's full config (native YAML merge), it only joins main's hostname.
testing:
  <<: *main
  route:
    shareWith: main      # use main's host
    pathPrefix: /testing # /testing → testing, everything else → main
