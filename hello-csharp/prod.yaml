main: &main
  routes:
    - main
    - main-long-timeout  # serves route "main" (policy in routes.yaml) and owns the pool
  hpa:
    minReplicas: 1
    maxReplicas: 2
    targetRPS: 100
  resources:
    requests:
      memory: 200Mi
      cpu: 100m
    limits:
      memory: 250Mi
      cpu: 150m

  traffic:
    rateLimit:
      enabled: true
      mode: local
      local:
        requestsPerSecond: 100
        burst: 20

  readinessProbe:
    path: /Health

  livenessProbe:
    path: /Health

# testing inherits main's full config (and its `route: main`), so its pods join the
# SAME pool — one Service load-balances across main + testing pods. No separate route.
testing:
  <<: *main
